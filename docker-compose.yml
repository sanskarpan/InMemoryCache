services:
  cache-engine-api:
    build:
      context: ./cache-engine
    image: cache-engine-api:local
    user: "0:0"
    environment:
      CACHE_ENGINE_ENV: production
      CACHE_ENGINE_ADDR: :8080
      CACHE_ENGINE_API_KEY: ${CACHE_ENGINE_API_KEY:?set CACHE_ENGINE_API_KEY}
      CACHE_ENGINE_ALLOWED_ORIGINS: http://localhost:4173
      CACHE_ENGINE_STATE_DB_PATH: /app/data/cache-engine.db
      CACHE_ENGINE_BACKING_STORE_DRIVER: sqlite
      CACHE_ENGINE_RATE_LIMIT_REQUESTS: 120
      CACHE_ENGINE_RATE_LIMIT_WINDOW_MS: 60000
      CACHE_ENGINE_SSE_TOKEN_TTL_MS: 120000
      CACHE_ENGINE_SHUTDOWN_TIMEOUT_MS: 15000
      CACHE_ENGINE_LOG_FORMAT: json
      CACHE_ENGINE_LOG_LEVEL: info
      CACHE_ENGINE_SEED_DEMO_DATA: "false"
    ports:
      - "8080:8080"
    volumes:
      - cache-engine-data:/app/data

  cache-engine-web:
    build:
      context: ./cache-engine/web
    image: cache-engine-web:local
    depends_on:
      - cache-engine-api
    environment:
      CACHE_ENGINE_UPSTREAM_HOST: cache-engine-api
      CACHE_ENGINE_UPSTREAM_API_KEY: ${CACHE_ENGINE_API_KEY:?set CACHE_ENGINE_API_KEY}
    ports:
      - "4173:80"

volumes:
  cache-engine-data:
