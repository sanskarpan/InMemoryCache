apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"

configMapGenerator:
  - name: cache-engine-dashboard
    files:
      - cache-engine-dashboard.json

resources:
  - secret.example.yaml
  - service-monitor.yaml
  - prometheus-rules.yaml
