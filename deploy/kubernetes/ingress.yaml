apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cache-engine
  namespace: cache-engine
spec:
  ingressClassName: nginx
  rules:
    - host: cache.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: cache-engine-api
                port:
                  number: 8080
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: cache-engine-api
                port:
                  number: 8080
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: cache-engine-api
                port:
                  number: 8080
          - path: /readyz
            pathType: Prefix
            backend:
              service:
                name: cache-engine-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cache-engine-web
                port:
                  number: 80
